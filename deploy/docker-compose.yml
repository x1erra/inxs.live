services:
  video-converter:
    build:
      context: ../apps/video-converter
    container_name: inxs-video-converter
    restart: unless-stopped
    ports:
      - "13000:3000"
    volumes:
      - video_converter_downloads:/data/downloads
      - video_converter_uploads:/data/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider
    container_name: inxs-bgutil-provider
    restart: unless-stopped

  video-downloader:
    build:
      context: ../apps/video-downloader
    container_name: inxs-video-downloader
    restart: unless-stopped
    ports:
      - "14000:4000"
    volumes:
      - video_downloader_downloads:/data/downloads
    environment:
      - BGUTIL_SERVER_URL=http://bgutil-provider:4416
    depends_on:
      - bgutil-provider
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: inxs-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - video-converter
      - video-downloader

volumes:
  video_converter_downloads:
  video_converter_uploads:
  video_downloader_downloads:
